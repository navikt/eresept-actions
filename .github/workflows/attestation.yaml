name: generate an attestation for the image, re-usable
on:
  workflow_call:
    inputs:
      application:
        description: 'the application to attest'
        required: true
        type: string
      image:
        description: 'the docker image'
        required: true
        type: string
        # no default
      digest:
        description: 'the digest of the image'
        required: false
        type: string
        # no default

env:
  TZ: Europe/Oslo

jobs:
  attest:
    timeout-minutes: 10
    name: Generate attestation of ${{ inputs.image }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Docker login
        uses: nais/login@bb6c3e1e14e53d40d69d0d092bd2fce2e39ae3bf #v0
        id: login
        with:
          team: teameresept

      - name: Generate SBOM, attest and sign image
        id: attest-sign
        uses: nais/attest-sign@bb00e4baa4e7acd00b6aff2502b2dfed3d4fad40 #v2.0.14
        with:
          image_ref: ${{ steps.login.outputs.registry }}/${{ inputs.application }}@${{ inputs.digest }}
