name: generate an attestation for the image, re-usable
on:
  workflow_call:
    inputs:
      application:
        description: 'the application to attest'
        required: true
        type: string
      image:
        description: 'the docker image'
        required: true
        type: string
        # no default
      digest:
        description: 'the digest of the image'
        required: false
        type: string
        # no default

env:
  TZ: Europe/Oslo

jobs:
  attest:
    timeout-minutes: 10
    name: Generate attestation of ${{ inputs.image }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Docker login
        uses: nais/login@bb6c3e1e14e53d40d69d0d092bd2fce2e39ae3bf #v0
        id: login
        with:
          team: teameresept

      - name: Generate SBOM, attest and sign image
        id: attest-sign
        uses: nais/attest-sign@47aaa4acd4986b43cf388640e14fb87761119c7b #v2.0.13
        with:
          image_ref: ${{ steps.login.outputs.registry }}/${{ inputs.application }}@${{ inputs.digest }}
