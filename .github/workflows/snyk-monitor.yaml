name: Snyk monitor, re-usable

on:
  workflow_call:
    inputs:
      threshold:
        description: 'severity threshold, default high'
        type: string
        required: false
        default: 'high'
    secrets:
      snyk-token:
        required: true
      token:
        description: 'github token'
        required: true

jobs:
  snyk-monitor:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd #v6.0.2
        with:
          persist-credentials: false

      - name: Create settings.xml
        uses: s4u/maven-settings-action@894661b3ddae382f1ae8edbeab60987e08cf0788 #v4.0.0
        with:
          repositories: '[{"id": "eresept-parent","name": "github","url": "https://maven.pkg.github.com/navikt/eresept-parent"}, {"id": "xerces","name": "github","url": "https://maven.pkg.github.com/navikt/xerces-xmlschema-1.1"}]'
          servers: '[{"id": "eresept-parent", "username": "${{ github.actor }}", "password": "${{ secrets.token }}"}, {"id": "xerces", "username": "${{ github.actor }}", "password": "${{ secrets.token }}"}]'
          path: maven-settings.xml

      - name: creates a project in your Snyk account to be continuously monitored
        uses: snyk/actions/maven@9adf32b1121593767fc3c057af55b55db032dc04 #master 2022-11-29
        env:
          SNYK_TOKEN: ${{ secrets.snyk-token }}
        with:
          command: monitor
          args: --org=teameresept --severity-threshold=${{ inputs.threshold }} --all-projects --exclude=report -- --settings snyk-settings.xml -DskipTests -Dmdep.skip=true -Dgitlog.phase=none
