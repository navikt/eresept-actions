name: maven release application, re-usable
on:
  workflow_call:
    inputs:
      java-version:
        description: the java version to use
        required: false
        type: number
        default: 21
      application:
        description: 'The application to release'
        required: true
        type: string
        # no default
      application-version:
        description: 'The version to release'
        required: false
        type: string
        # no default
      skip-tests:
        description: 'if execution of tests should be skipped'
        required: false
        type: boolean
        default: false
      salsa:
        description: 'if we shall generate a attestation for the image'
        required: false
        type: boolean
        default: true
      scan:
        description: 'if we shall scan the image'
        required: false
        type: boolean
        default: true
    secrets:
      webhook:
        required: true
      token:
        required: true
    outputs:
      image:
        description: 'the docker image'
        value: ${{ jobs.release.outputs.image }}
      digest:
        description: 'the image digest'
        value: ${{ jobs.release.outputs.digest }}


env:
  TZ: Europe/Oslo

jobs:
  release:
    timeout-minutes: 40
    name: Release ${{ inputs.application }}
    runs-on: ubuntu-latest
    outputs:
      image: ${{ steps.docker-build-push.outputs.image }}
      digest: ${{ steps.docker-build-push.outputs.digest }}
    permissions:
      actions: read # for private repositories
      contents: write
      id-token: write
      security-events: write # push sarif to github security
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 #v7.0.0
        with:
          fetch-depth: 0
          repository: ${{ github.event.repository.owner.login }}/${{ inputs.application }}
          ref: '${{ github.ref_name }}'
          persist-credentials: true
          show-progress: false

      - name: Create settings.xml
        uses: s4u/maven-settings-action@894661b3ddae382f1ae8edbeab60987e08cf0788 #v4.0.0
        with:
          repositories: '[{"id": "eresept-parent","name": "github","url": "https://maven.pkg.github.com/navikt/eresept-parent"}, {"id": "xerces","name": "github","url": "https://maven.pkg.github.com/navikt/xerces-xmlschema-1.1"}]'
          servers: '[{"id": "eresept-parent", "username": "${{ github.actor }}", "password": "${{ secrets.token }}"}, {"id": "xerces", "username": "${{ github.actor }}", "password": "${{ secrets.token }}"}]'
          path: maven-settings.xml

      - uses: actions/setup-java@1bcf9fb12cf4aa7d266a90ae39939e61372fe520 #v5.4.0
        with:
          distribution: 'temurin'
          java-version: '${{ inputs.java-version }}'
          overwrite-settings: true

      - name: Cache local Maven repository
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-maven-${{ inputs.application }}

      - name: Get start time
        run: |
          echo "starttime=$(date +%s)" >> $GITHUB_ENV
          sudo timedatectl set-timezone "Europe/Oslo"

      - name: get versions, changelog and more
        id: get-versions
        uses: navikt/eresept-actions/get-versions-and-more@main
        with:
          application-version: '${{ inputs.application-version }}'

      - name: Compile and test
        run: |
          mvn -ntp --batch-mode versions:set -DnewVersion=${NEXT_VERSION} -DgenerateBackupPoms=false -DprocessAllModules=true --settings maven-settings.xml
          SKIPTESTS=$(if [ "${SKIP}" = "true" ]; then echo "-DskipTests"; else echo ""; fi) 
          mvn -ntp --batch-mode clean install --no-transfer-progress $SKIPTESTS -Ddetekt.skip=${SKIP} --settings maven-settings.xml
        env:
          SKIP: ${{ inputs.skip-tests }}
          NEXT_VERSION: ${{ steps.get-versions.outputs.next-version }}

      - name: Tag
        run: |
          git tag -a ${NEXT_VERSION} -m "tagging as ${NEXT_VERSION}"
          git push origin ${NEXT_VERSION}
        env:
          NEXT_VERSION: ${{ steps.get-versions.outputs.next-version }}

      - name: Docker build and push
        id: docker-build-push
        uses: nais/docker-build-push@31c3a7321909bcb20799fdf46153fec721fd9512 # v0
        with:
          team: teameresept
          docker_context: ${{ steps.get-versions.outputs.docker-dir }}
          dockerfile: ${{ steps.get-versions.outputs.docker-dir }}/Dockerfile
          tag: ${{ steps.get-versions.outputs.next-version }}
          salsa: ${{ inputs.salsa }}
          build_args: |
            version=${{ steps.get-versions.outputs.next-version }}
            app_name=${{ inputs.application }}

      - name: Checkout badges
        uses: navikt/eresept-actions/badges-checkout@main

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        if: ${{ inputs.scan }}
        with:
          image-ref: '${{ steps.docker-build-push.outputs.image }}'
          format: 'sarif'
          hide-progress: true
          output: 'trivy-results.sarif'
          severity: 'MEDIUM,HIGH,CRITICAL'
          limit-severities-for-sarif: true

      - name: Upload results to GitHub Security
        uses: github/codeql-action/upload-sarif@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v3.29.5
        if: ${{ inputs.scan }}
        with:
          sarif_file: 'trivy-results.sarif'


      - name: Calculate execution time
        run: |
          END_TIME=$(date +%s)
          echo "exectime=$(( $END_TIME - ${starttime} ))" >> $GITHUB_ENV

      - name: Version badge
        uses: navikt/eresept-actions/badges-create@main
        with:
          left: 'version'
          right: '${{ steps.get-versions.outputs.next-version }}'
          color: 'blue'
          filename: 'version'
          logo: 'tag'

      - name: Release date badge
        uses: navikt/eresept-actions/badges-create@main
        with:
          left: 'release date'
          right: '${{ steps.get-versions.outputs.current-datetime }}'
          color: 'blue'
          filename: 'rel-date'
          logo: 'calendar'

      - name: Time used badge
        uses: navikt/eresept-actions/badges-create@main
        with:
          left: 'release execution time'
          right: '${{ env.exectime }}'
          color: 'blue'
          filename: 'rel-exec-time'
          logo: 'stopwatch'

      - name: Commit badges
        uses: navikt/eresept-actions/badges-commit@main

      - name: Summary
        run: |
          echo "### Released **${REPO}:${NEXT_VERSION}** in ${exectime} seconds" >> $GITHUB_STEP_SUMMARY
        env:
          REPO: ${{ github.event.repository.name }}
          NEXT_VERSION: ${{ steps.get-versions.outputs.next-version }}

      - name: report to slack
        if: always()
        uses: navikt/eresept-actions/slack-notify@main
        with:
          status: "${{ job.status }}"
          username: "release ${{ inputs.application }}:${{ steps.get-versions.outputs.next-version }}"
          icon: ":docker:"
          title-success: "Released _*${{ inputs.application }}:${{ steps.get-versions.outputs.next-version }}*_ in ${{ env.exectime }} seconds"
          title-failure: "Release of _*${{ inputs.application }}*_ failed"
          title-cancelled: "Release of _*${{ inputs.application }}*_ was cancelled"
          message-success: "```${{ steps.get-versions.outputs.changelog }}```"
          webhook: ${{ secrets.webhook }}

